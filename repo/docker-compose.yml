name: medops

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medops
      POSTGRES_USER: medops
      POSTGRES_PASSWORD: medops
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medops -d medops"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://medops:medops@db:5432/medops?sslmode=disable"
      JWT_SECRET: "medops-local-secret-change-in-production"
      ENCRYPT_KEY: "0123456789abcdef0123456789abcdef"
      HMAC_SIGNING_KEY: "medops-export-signing-key-change-in-production"
      LOG_LEVEL: "info"
      DATA_DIR: "/data/medops"
      TENANT_ID: "default"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - filedata:/data/medops
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # Frontend Vitest runner — executes component + unit tests in a throwaway
  # node container so the host does not need Node.js installed. The rollup
  # linux/musl binary must be installed explicitly because npm's optional-deps
  # resolver sometimes drops it (known npm bug — same workaround as the
  # frontend Dockerfile uses for production builds).
  frontend-tests:
    profiles: ["test"]
    image: node:18-alpine
    working_dir: /src
    volumes:
      - ./frontend:/src
    environment:
      CI: "true"
    command: >
      sh -c "npm install --legacy-peer-deps --omit=optional --no-audit --no-fund > /dev/null 2>&1 &&
             ROLLUP_VER=$$(node -e 'console.log(require(\"./node_modules/rollup/package.json\").version)') &&
             npm install --no-save --no-audit --no-fund \"@rollup/rollup-linux-x64-musl@$${ROLLUP_VER}\" > /dev/null 2>&1 &&
             npx vitest run --reporter=default"

  # Backend Go test runner — uses the `test` profile so it's NOT started by
  # default. Avoids host path-quoting issues with `docker run -v $(pwd)/backend`
  # on Windows Git Bash. Run with:
  #   docker compose --profile test run --rm backend-tests
  backend-tests:
    profiles: ["test"]
    image: golang:1.22-alpine
    working_dir: /src
    volumes:
      - ./backend:/src
    environment:
      CGO_ENABLED: "0"
    # Run all Go unit + handler integration tests. No real DB is needed — the
    # existing tests use stubs / capturing SQL drivers. Tests exercise real
    # business logic paths (authz, statement lifecycle, zip archives, etc).
    command: >
      sh -c "apk add --no-cache git > /dev/null 2>&1 && go test ./... -count=1"

  # End-to-end test runner — uses the `test` profile so it is NOT started by
  # default `docker compose up`. Run it with:
  #   docker compose --profile test run --rm e2e
  e2e:
    profiles: ["test"]
    build:
      context: ./e2e
      dockerfile: Dockerfile
    environment:
      FRONTEND_URL: "http://frontend:3000"
      API_URL: "http://backend:8080/api/v1"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./e2e/tests:/app/tests
      - ./e2e/playwright.config.ts:/app/playwright.config.ts
      - ./e2e/test-results:/app/test-results
      - ./e2e/playwright-report:/app/playwright-report

volumes:
  pgdata:
  filedata:
