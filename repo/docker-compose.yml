services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medops
      POSTGRES_USER: medops
      POSTGRES_PASSWORD: medops
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medops -d medops"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://medops:medops@db:5432/medops?sslmode=disable"
      JWT_SECRET: "medops-local-secret-change-in-production"
      ENCRYPT_KEY: "0123456789abcdef0123456789abcdef"
      HMAC_SIGNING_KEY: "medops-export-signing-key-change-in-production"
      LOG_LEVEL: "info"
      DATA_DIR: "/data/medops"
      TENANT_ID: "default"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - filedata:/data/medops
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  filedata:
